<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Business Card</title>
  <style>
    body {
      font-family: "Goudy Old Style", Garamond, serif;
      text-align: center;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #fdf7ec;
      color: #333;
    }

    header,
    section,
    figure {
      max-width: 700px;
      width: 100%;
      padding: 0 1rem;
    }

    header h1 {
      margin-bottom: 0.2rem;
    }

    section {
      margin: 1rem 0;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Jane Doe</h1>
    <p>Web Developer | UX Enthusiast | Remote-friendly</p>
  </header>

  <section>
    <h2>Experience</h2>
    <p>3 years building responsive websites and accessible web applications.</p>
  </section>

  <section>
    <h2>Contact</h2>
    <p>Email: jane.doe@example.com</p>
    <p>Phone: (123) 456-7890</p>
  </section>

  <figure>
    <img src="glowing-street-lamps-stockcake.webp" alt="Glowing street lamps at night" />
    <figcaption>Professional headshot</figcaption>
  </figure>
</body>
</html>
